      <div class="nav-mobile-lang-options">

          `<button class="nav-mobile-lang-btn ${l === currentLang ? 'active' : ''}" data-lang="${l}">${langMeta[l].flag} ${langMeta[l].label}</button>`
        ).join('')}
      </div>
    </div>`;
  document.getElementById('nav-mobile').querySelectorAll('.nav-mobile-lang-btn').forEach(btn => {
    btn.addEventListener('click', () => { setLang(btn.dataset.lang); mobileOpen = false; renderMobileNav(); });
  });
}

// ── Title rotation ──
let titleInterval;
function startTitleRotation() {
  clearInterval(titleInterval);
  titleInterval = setInterval(() => {
    const el = document.getElementById('rotating-title');
    if (!el) { clearInterval(titleInterval); return; }
    titleIndex = (titleIndex + 1) % t().hero.titles.length;
    el.style.animation = 'none';
    el.offsetHeight;
    el.textContent = t().hero.titles[titleIndex];
    el.style.animation = 'fadeIn 0.4s ease forwards';
  }, 3000);
}

// ── Contact form ──
function setupContactForm() {
  const form = document.getElementById('contact-form');
  if (!form) return;
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('form-status');
    btn.disabled = true;
    btn.textContent = t().contact.sending;
    await new Promise(r => setTimeout(r, 1500));
    btn.disabled = false;
    btn.innerHTML = `${t().contact.send} ${icons.send}`;
    form.reset();
    status.innerHTML = `<div class="form-msg success">${icons.check} ${t().contact.success}</div>`;
    setTimeout(() => { status.innerHTML = ''; }, 5000);
  });
}

// ── Scroll nav ──
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// ── Hamburger ──
document.getElementById('hamburger').addEventListener('click', () => {
  mobileOpen = !mobileOpen;
  document.getElementById('nav-mobile').classList.toggle('open', mobileOpen);
  document.getElementById('hamburger').innerHTML = mobileOpen ? icons.x : icons.menu;
  document.getElementById('hamburger').setAttribute('aria-expanded', mobileOpen);
  document.body.style.overflow = mobileOpen ? 'hidden' : '';
});

// ── Language dropdown ──
document.getElementById('lang-toggle').addEventListener('click', (e) => {
  e.stopPropagation();
  langDropdownOpen = !langDropdownOpen;
  document.getElementById('lang-dropdown').classList.toggle('open', langDropdownOpen);
});

document.addEventListener('click', () => {
  langDropdownOpen = false;
  document.getElementById('lang-dropdown').classList.remove('open');
});

// ── Close mobile nav on resize ──
window.addEventListener('resize', () => {
  if (window.innerWidth >= 768 && mobileOpen) {
    mobileOpen = false;
    document.getElementById('nav-mobile').classList.remove('open');
    document.getElementById('hamburger').innerHTML = icons.menu;
    document.body.style.overflow = '';
  }
});

// ── Init ──
render();
